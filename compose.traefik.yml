services:
  traefik-init:
    image: docker.io/alpine:latest
    entrypoint: sh
    environment:
      ROCKETCHAT_BACKEND_SERVERS: ${ROCKETCHAT_BACKEND_SERVERS:-rocketchat:3000}
      LETSENCRYPT_ENABLED: ${LETSENCRYPT_ENABLED:-false}
      ENABLE_JITSI: ${ENABLE_JITSI:-false}
    command:
      - -c
      - |-
        set -e
        rm -rf /traefik_config/* || true
        mkdir -p /traefik_config/http /traefik_config/https
        # Set TLS block early so it is available for the Jitsi https snippet below
        if [ "$$LETSENCRYPT_ENABLED" = "true" ]; then
          TLS_BLOCK='certResolver: le'
        else
          TLS_BLOCK='{}'
        fi
        # Pre-write optional Jitsi config snippets at base indentation level.
        # Heredoc terminators inside if-blocks gain 2 leading spaces from YAML
        # block-scalar stripping, rendering as "  EOF" which sh rejects (must be
        # at column 0). Pre-writing to temp files here avoids the issue entirely.
        cat <<'EOF' > /traefik_config/jitsi_svc.tpl
            jitsi:
              loadBalancer:
                servers:
                  - url: "http://web:80"
        EOF
        cat <<'EOF' > /traefik_config/jitsi_http.tpl
            jitsi:
              entryPoints:
                - http
              service: jitsi
              rule: Host(`{{ env "JITSI_DOMAIN" }}`) && PathPrefix(`/`)
        EOF
        cat > /traefik_config/jitsi_https.tpl <<JITSI_HTTPS
            jitsi:
              entryPoints:
                - https
              service: jitsi
              rule: Host(\`{{ env "JITSI_DOMAIN" }}\`)
              tls:
                $$TLS_BLOCK
        JITSI_HTTPS
        # this should be indented so it works inside the heredoc concatenation later
        cat <<'EOF' > /traefik_config/services.tpl
          services:
            grafana:
              loadBalancer:
                servers:
                  - url: "http://grafana:3000"
            rocketchat:
              loadBalancer:
                healthCheck:
                  path: /health
                  interval: 10s
                  timeout: 3s
                servers:
        EOF

        echo "ROCKETCHAT_BACKEND_SERVERS $$ROCKETCHAT_BACKEND_SERVERS"
        # append the server list to the services template
        for server in $(echo $$ROCKETCHAT_BACKEND_SERVERS | tr "," "\n" | tr -d " "); do
          echo "          - url: \"http://$$server\"" >> /traefik_config/services.tpl
        done

        if [ "$$ENABLE_JITSI" = "true" ]; then
          cat /traefik_config/jitsi_svc.tpl >> /traefik_config/services.tpl
        fi


        cat <<'EOF' > /traefik_config/http/dynamic.yml
        http:
          routers:
            rocketchat:
              entryPoints:
                - http
              service: rocketchat
              rule: Host(`{{ env "DOMAIN" }}`) && PathPrefix(`/`)
            grafana:
              entryPoints:
                - http
              service: grafana
              rule: |-
                {{ if eq (env "GRAFANA_DOMAIN") "" }}
                  Host(`{{ env "DOMAIN" }}`) && PathPrefix(`{{ env "GRAFANA_PATH" }}`)
                {{ else }}
                  Host(`{{ env "GRAFANA_DOMAIN" }}`)
                {{ end }}
        EOF

        if [ "$$ENABLE_JITSI" = "true" ]; then
          cat /traefik_config/jitsi_http.tpl >> /traefik_config/http/dynamic.yml
        fi

        cat > /traefik_config/https/dynamic.yml <<TLSEOF
        http:
          routers:
            rocketchat:
              entryPoints:
                - https
              service: rocketchat
              rule: Host(\`{{ env "DOMAIN" }}\`)
              tls:
                $$TLS_BLOCK
            grafana:
              entryPoints:
                - https
              rule: |
                {{ if eq (env "GRAFANA_DOMAIN") "" }}
                  Host(\`{{ env "DOMAIN" }}\`) && PathPrefix(\`{{ env "GRAFANA_PATH" }}\`)
                {{ else }}
                  Host(\`{{ env "GRAFANA_DOMAIN" }}\`)
                {{ end }}
              service: grafana
              tls:
                $$TLS_BLOCK
        TLSEOF

        if [ "$$ENABLE_JITSI" = "true" ]; then
          cat /traefik_config/jitsi_https.tpl >> /traefik_config/https/dynamic.yml
        fi

        cat /traefik_config/services.tpl >> /traefik_config/http/dynamic.yml
        cat /traefik_config/services.tpl >> /traefik_config/https/dynamic.yml
        cat /traefik_config/http/dynamic.yml
        echo "-------------------------"
        cat /traefik_config/https/dynamic.yml

        echo "files generated, keeping container alive to podman-compose detect it"
        tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "test -f /traefik_config/http/dynamic.yml && test -f /traefik_config/https/dynamic.yml"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 2s
    volumes:
      - traefik_config:/traefik_config:Z
    restart: "no"

  traefik:
    image: docker.io/traefik:${TRAEFIK_RELEASE:-v3.4}
    restart: always
    depends_on:
      traefik-init:
        condition: service_healthy
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
      GRAFANA_DOMAIN: "${GRAFANA_DOMAIN-}"
      GRAFANA_PATH: "${GRAFANA_PATH-/}"
      JITSI_DOMAIN: "${JITSI_DOMAIN:-meet.localhost}"
      TRAEFIK_PROTOCOL: "${TRAEFIK_PROTOCOL-}"
    command:
      - --api.insecure=${TRAEFIK_API_INSECURE:-false}
      - --providers.docker=false
      - --providers.docker.exposedbydefault=false
      - --entrypoints.https.address=:${TRAEFIK_HTTPS_PORT:-443}
      - --entrypoints.metrics.address=:9096
      - --metrics.prometheus=true
      # ssl
      - --certificatesresolvers.le.acme.tlschallenge=${LETSENCRYPT_ENABLED:-false}
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL:-demo@email.com}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      # ssl
      - --metrics.prometheus.entryPoint=metrics # Associate metrics with the 'metrics' entry point
      - --metrics.prometheus.addEntryPointsLabels=true
      - --metrics.prometheus.addRoutersLabels=true
      - --metrics.prometheus.addServicesLabels=true
      - --providers.file.filename=/traefik_config/${TRAEFIK_PROTOCOL}/dynamic.yml
      - --providers.file.watch=true
    ports:
      - ${TRAEFIK_DASHBOARD_PORT:-9080}:8080
      - ${TRAEFIK_HTTPS_PORT:-443}:${TRAEFIK_HTTPS_PORT:-443}
    expose:
      - 9096
      - ${TRAEFIK_DASHBOARD_PORT:-9080}
      - ${TRAEFIK_HTTPS_PORT:-443}
    volumes:
      - traefik_ssl:/letsencrypt:Z
      - traefik_config:/traefik_config:Z
      # healthcheck:
      #   test: ["CMD", "traefik", "healthcheck"]
      #   interval: 30s
      #   timeout: 30s
      #   retries: 5
      #   start_period: 30s
    logging:
      driver: "json-file"
    labels:
      container_tag: "${COMPOSE_PROJECT_NAME:-rocketchat}#traefik"

volumes:
  # this is for ssl shennanigans, users usually won't need to bother with it
  traefik_ssl: {driver: local}
  traefik_config: {driver: local}
