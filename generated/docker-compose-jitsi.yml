services:
  rocketchat:
    image: ${IMAGE:-registry.rocket.chat/rocketchat/rocket.chat}:${RELEASE:-8.0.1}
    restart: always
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: ${METRICS_PORT:-9458}
      container_tag: "${COMPOSE_PROJECT_NAME:-rocketchat}#rocketchat"
    environment:
      ROOT_URL: ${ROOT_URL:-http://localhost}
      PORT: ${PORT:-3000}
      DEPLOY_METHOD: docker
      DEPLOY_PLATFORM: compose
      REG_TOKEN: ${REG_TOKEN:-}
      LICENSE_DEBUG: true
      OVERWRITE_SETTING_Prometheus_Enabled: true
      OVERWRITE_SETTING_Prometheus_Port: "${METRICS_PORT:-9458}"
      MONGO_URL: ${MONGO_URL:-mongodb://mongodb:27017/rocketchat?replicaSet=rs0}
      TRANSPORTER: "${NATS_URL-monolith+nats://nats:4222}"
      INSTANCE_IP: "${INSTANCE_IP:-}"
      # SMTP Configuration

      OVERWRITE_SETTING_SMTP_Host: ${SMTP_HOST:-}
      OVERWRITE_SETTING_SMTP_Port: ${SMTP_PORT:-587}
      OVERWRITE_SETTING_SMTP_Username: ${SMTP_USERNAME:-}
      OVERWRITE_SETTING_SMTP_Password: ${SMTP_PASSWORD:-}
      OVERWRITE_SETTING_From_Email: ${SMTP_FROM_EMAIL:-noreply@localhost}
      OVERWRITE_SETTING_SMTP_Protocol: ${SMTP_PROTOCOL:-smtp}
      OVERWRITE_SETTING_SMTP_IgnoreTLS: ${SMTP_IGNORE_TLS:-false}
    # depends_on:

    #   mongodb-init-container:

    #     condition: service_completed_successfully
    entrypoint: sh
    command:
      - -c
      - |
        echo "=====> Waiting for MongoDB (mongodb:27017) to be ready before starting Rocket.Chat...";
        for i in $(seq 1 60); do
          if nc -z mongodb 27017 >/dev/null 2>&1; then
            echo "=====> MongoDB is up - starting Rocket.Chat";
            exec node main.js;
          fi;
          echo "=====> MongoDB not ready yet, retrying in 5 seconds...";
          sleep 5;
        done;
        echo "=====> Giving up waiting for MongoDB after 5 minutes";
        exit 1
    expose:
      - ${PORT:-3000}
      - ${METRICS_PORT:-9458}
    ports:
      - "${BIND_IP:-0.0.0.0}:${HOST_PORT:-3000}:${PORT:-3000}"
      - "${BIND_IP:-0.0.0.0}:${METRICS_PORT:-9458}:${METRICS_PORT:-9458}"
    logging:
      driver: "json-file"
    # healthcheck:
  nats:
    image: docker.io/nats:${NATS_VERSION:-2.11-alpine}
    restart: always
    expose:
      - 4222
      - 8222
      - 6222
    # healthcheck:

    #   test: ["CMD", "nc", "-zv", "-w", "10", "nats", "4222"]

    #   interval: 30s

    #   timeout: 10s

    #   retries: 10

    #   start_period: 30s
    command: --http_port 8222
    ports:
      - "${NATS_BIND_IP:-127.0.0.1}:${NATS_PORT_NUMBER:-4222}:4222"
    logging:
      driver: "json-file"
    labels:
      container_tag: "${COMPOSE_PROJECT_NAME:-rocketchat}#nats"
  nats-exporter:
    image: docker.io/natsio/prometheus-nats-exporter:${NATS_EXPORTER_VERSION:-0.17.3}
    depends_on:
      - nats
    expose:
      - 7777
    command:
      - -healthz
      - -varz
      - "http://nats:8222"
  mongodb-fix-permission-container:
    image: docker.io/mongodb/mongodb-community-server:${MONGODB_VERSION:-8.2}-ubi8
    restart: on-failure
    user: "0"
    volumes:
      - ${MONGODB_HOST_PATH:-mongodb_data}:/data/db:rw
    environment:
      MONGODB_USER_ID: ${MONGODB_USER_ID:-1001}
    entrypoint: |
      sh -xc '
        owner="$(stat -c %u /data/db)";
        # for fresh installs
        if [ "$$owner" != "$$MONGODB_USER_ID" ]; then
          echo "=====> Fixing directory ownership to uid $$MONGODB_USER_ID"
          chown -R "$$MONGODB_USER_ID" /data/db;
        else echo "=====> Nothing to do"; fi;
      '
  # TODO: add user creation here

  mongodb-init-container:
    image: docker.io/mongodb/mongodb-community-server:${MONGODB_VERSION:-8.2}-ubi8
    restart: on-failure
    # depends_on:

    #   mongodb:

    #     condition: service_healthy
    user: "0"
    environment:
      MONGODB_REPLICA_SET_NAME: ${MONGODB_REPLICA_SET_NAME:-rs0}
      MONGODB_PORT_NUMBER: ${MONGODB_PORT_NUMBER:-27017}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/?directConnection=true}
      MONGODB_ADVERTISED_HOSTNAME: ${MONGODB_ADVERTISED_HOSTNAME:-mongodb}
    volumes:
      - ${MONGODB_HOST_PATH:-mongodb_data}:/data/db:rw
    logging:
      driver: "json-file"
    labels:
      container_tag: "${COMPOSE_PROJECT_NAME:-rocketchat}#mongodb-init-container"
    entrypoint: |
      sh -xc '
        echo "=====> Waiting for MongoDB to be healthy before initiating replica set...";
        until mongosh "$$MONGODB_URI" --eval "db.adminCommand(\"ping\")" >/dev/null 2>&1; do
          echo "=====> MongoDB not ready yet, retrying in 5 seconds...";
          sleep 5;
        done;
        echo "=====> Initiating ReplSet $$MONGODB_REPLICA_SET_NAME at $$MONGODB_ADVERTISED_HOSTNAME:$$MONGODB_PORT_NUMBER...";
        mongosh "$$MONGODB_URI" --eval "rs.initiate({_id: \"$$MONGODB_REPLICA_SET_NAME\", members: [{ _id: 0, host: \"$$MONGODB_ADVERTISED_HOSTNAME:$$MONGODB_PORT_NUMBER\" }]})";
        echo "=====> Initiating ReplSet done...";
      '
  mongodb:
    image: docker.io/mongodb/mongodb-community-server:${MONGODB_VERSION:-8.2}-ubi8
    restart: always
    # depends_on:

    #   mongodb-fix-permission-container:

    #     condition: service_completed_successfully
    volumes:
      - ${MONGODB_HOST_PATH:-mongodb_data}:/data/db:rw
    user: "${MONGODB_USER_ID:-1001}"
    entrypoint:
      - sh
      - -ec
      - |
        echo "=====> Waiting for /data/db to be owned by uid=$$MONGODB_USER_ID (mongodb user) ...";
        for i in $(seq 1 60); do
          owner="$(stat -c %u /data/db 2>/dev/null || true)";
          if [ "$$owner" = "$$MONGODB_USER_ID" ]; then
            echo "=====> /data/db ownership OK ($$owner) - starting MongoDB";
            exec mongod --replSet "$$MONGODB_REPLICA_SET_NAME" --bind_ip_all;
          fi;
          echo "=====> /data/db owner is '$$owner' (expected $$MONGODB_USER_ID), retrying in 5 seconds...";
          sleep 5;
        done;
        echo "=====> Giving up waiting for /data/db ownership after 5 minutes";
        exit 1
    environment:
      MONGODB_USER_ID: ${MONGODB_USER_ID:-1001}
      MONGODB_REPLICA_SET_NAME: ${MONGODB_REPLICA_SET_NAME:-rs0}
      MONGODB_PORT_NUMBER: ${MONGODB_PORT_NUMBER:-27017}
      MONGODB_ADVERTISED_HOSTNAME: ${MONGODB_ADVERTISED_HOSTNAME:-mongodb}
      ALLOW_EMPTY_PASSWORD: ${ALLOW_EMPTY_PASSWORD:-yes}
    logging:
      driver: "json-file"
    labels:
      container_tag: "${COMPOSE_PROJECT_NAME:-rocketchat}#mongodb"
    healthcheck:
      test:
        - CMD
        - mongosh
        - "mongodb://${MONGODB_ADVERTISED_HOSTNAME:-mongodb}:${MONGODB_PORT_NUMBER:-27017}/?directConnection=true"
        - --eval
        - '"db.adminCommand(''ping'')"'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    ports:
      - "${MONGODB_BIND_IP:-127.0.0.1}:${MONGODB_PORT_NUMBER:-27017}:${MONGODB_PORT_NUMBER:-27017}"
  mongodb-exporter:
    image: docker.io/percona/mongodb_exporter:${MONGODB_EXPORTER_VERSION:-0.44.0}
    depends_on:
      - mongodb
    expose:
      - 9216
    command:
      - --mongodb.uri=${MONGODB_URI:-mongodb://mongodb:27017}
      - --collect-all
      - --compatible-mode
  traefik-init:
    image: docker.io/alpine:latest
    entrypoint: sh
    environment:
      ROCKETCHAT_BACKEND_SERVERS: ${ROCKETCHAT_BACKEND_SERVERS:-rocketchat:3000}
      LETSENCRYPT_ENABLED: ${LETSENCRYPT_ENABLED:-false}
      ENABLE_JITSI: ${ENABLE_JITSI:-false}
    command:
      - -c
      - |-
        set -e
        # quote 'eof' to prevent variable expansion
        rm -rf /traefik_config/* || true
        mkdir -p /traefik_config/http /traefik_config/https
        # this should be idented so it works inside the heredoc concatenation later
        cat <<'EOF' > /traefik_config/services.tpl
          services:
            grafana:
              loadBalancer:
                servers:
                  - url: "http://grafana:3000"
            rocketchat:
              loadBalancer:
                healthCheck:
                  path: /health
                  interval: 10s
                  timeout: 3s
                servers:
        EOF

        echo "ROCKETCHAT_BACKEND_SERVERS $$ROCKETCHAT_BACKEND_SERVERS"
        # append the server list to the services template
        for server in $(echo $$ROCKETCHAT_BACKEND_SERVERS | tr "," "\n" | tr -d " "); do
          echo "          - url: \"http://$$server\"" >> /traefik_config/services.tpl
        done

        if [ "$$ENABLE_JITSI" = "true" ]; then
          cat <<'EOF' >> /traefik_config/services.tpl
            jitsi:
              loadBalancer:
                servers:
                  - url: "http://web:80"
          EOF
        fi


        cat <<'EOF' > /traefik_config/http/dynamic.yml
        http:
          routers:
            rocketchat:
              entryPoints:
                - http
              service: rocketchat
              rule: Host(`{{ env "DOMAIN" }}`) && PathPrefix(`/`)
            grafana:
              entryPoints:
                - http
              service: grafana
              rule: |-
                {{ if eq (env "GRAFANA_DOMAIN") "" }}
                  Host(`{{ env "DOMAIN" }}`) && PathPrefix(`{{ env "GRAFANA_PATH" }}`)
                {{ else }}
                  Host(`{{ env "GRAFANA_DOMAIN" }}`)
                {{ end }}
        EOF

        if [ "$$ENABLE_JITSI" = "true" ]; then
          cat <<'EOF' >> /traefik_config/http/dynamic.yml
            jitsi:
              entryPoints:
                - http
              service: jitsi
              rule: Host(`{{ env "JITSI_DOMAIN" }}`) && PathPrefix(`/`)
          EOF
        fi

        # Build the tls block conditionally:
        # - With LE enabled: use certResolver to get a real cert
        # - Without LE: empty tls block uses Traefik's default self-signed cert
        if [ "$$LETSENCRYPT_ENABLED" = "true" ]; then
          TLS_BLOCK='certResolver: le'
        else
          TLS_BLOCK='{}'
        fi

        cat > /traefik_config/https/dynamic.yml <<TLSEOF
        http:
          routers:
            rocketchat:
              entryPoints:
                - https
              service: rocketchat
              rule: Host(\`{{ env "DOMAIN" }}\`)
              tls:
                $$TLS_BLOCK
            grafana:
              entryPoints:
                - https
              rule: |
                {{ if eq (env "GRAFANA_DOMAIN") "" }}
                  Host(\`{{ env "DOMAIN" }}\`) && PathPrefix(\`{{ env "GRAFANA_PATH" }}\`)
                {{ else }}
                  Host(\`{{ env "GRAFANA_DOMAIN" }}\`)
                {{ end }}
              service: grafana
              tls:
                $$TLS_BLOCK
        TLSEOF

        if [ "$$ENABLE_JITSI" = "true" ]; then
          cat >> /traefik_config/https/dynamic.yml <<'EOF'
            jitsi:
              entryPoints:
                - https
              service: jitsi
              rule: Host(\`{{ env "JITSI_DOMAIN" }}\`)
              tls:
          EOF
          if [ "$$LETSENCRYPT_ENABLED" = "true" ]; then
            echo "                certResolver: le" >> /traefik_config/https/dynamic.yml
          else
            echo "                {}" >> /traefik_config/https/dynamic.yml
          fi
        fi

        cat /traefik_config/services.tpl >> /traefik_config/http/dynamic.yml
        cat /traefik_config/services.tpl >> /traefik_config/https/dynamic.yml
        cat /traefik_config/http/dynamic.yml
        echo "-------------------------"
        cat /traefik_config/https/dynamic.yml

        echo "files generated, keeping container alive to podman-compose detect it"
        tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "test -f /traefik_config/http/dynamic.yml && test -f /traefik_config/https/dynamic.yml"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 2s
    volumes:
      - traefik_config:/traefik_config:Z
    restart: "no"
  traefik:
    image: docker.io/traefik:${TRAEFIK_RELEASE:-v3.4}
    restart: always
    depends_on:
      traefik-init:
        condition: service_healthy
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
      GRAFANA_DOMAIN: "${GRAFANA_DOMAIN-}"
      GRAFANA_PATH: "${GRAFANA_PATH-/}"
      JITSI_DOMAIN: "${JITSI_DOMAIN:-meet.localhost}"
      TRAEFIK_PROTOCOL: "${TRAEFIK_PROTOCOL-}"
    command:
      - --api.insecure=${TRAEFIK_API_INSECURE:-false}
      - --providers.docker=false
      - --providers.docker.exposedbydefault=false
      - --entrypoints.https.address=:${TRAEFIK_HTTPS_PORT:-443}
      - --entrypoints.metrics.address=:9096
      - --metrics.prometheus=true
      # ssl

      - --certificatesresolvers.le.acme.tlschallenge=${LETSENCRYPT_ENABLED:-false}
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL:-demo@email.com}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      # ssl

      - --metrics.prometheus.entryPoint=metrics # Associate metrics with the 'metrics' entry point
      - --metrics.prometheus.addEntryPointsLabels=true
      - --metrics.prometheus.addRoutersLabels=true
      - --metrics.prometheus.addServicesLabels=true
      - --providers.file.filename=/traefik_config/${TRAEFIK_PROTOCOL}/dynamic.yml
      - --providers.file.watch=true
    ports:
      - ${TRAEFIK_DASHBOARD_PORT:-9080}:8080
      - ${TRAEFIK_HTTPS_PORT:-443}:${TRAEFIK_HTTPS_PORT:-443}
    expose:
      - 9096
      - ${TRAEFIK_DASHBOARD_PORT:-9080}
      - ${TRAEFIK_HTTPS_PORT:-443}
    volumes:
      - traefik_ssl:/letsencrypt:Z
      - traefik_config:/traefik_config:Z
      # healthcheck:
    #   test: ["CMD", "traefik", "healthcheck"]

    #   interval: 30s

    #   timeout: 30s

    #   retries: 5

    #   start_period: 30s

    logging:
      driver: "json-file"
    labels:
      container_tag: "${COMPOSE_PROJECT_NAME:-rocketchat}#traefik"
  web:
    image: docker.io/jitsi/web:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: always
    ports:
      - "127.0.0.1:${JITSI_HTTP_PORT:-8000}:80"
    expose:
      - "80"
    volumes:
      - jitsi_web_config:/config:Z
      - jitsi_web_crontabs:/var/spool/cron/crontabs:Z
      - jitsi_transcripts:/usr/share/jitsi-meet/transcripts:Z
      - jitsi_web_load_test:/usr/share/jitsi-meet/load-test:Z
    labels:
      container_tag: "${COMPOSE_PROJECT_NAME:-rocketchat}#jitsi-web"
    environment:
      TZ: ${TZ:-UTC}
      PUBLIC_URL: ${JITSI_PUBLIC_URL:-https://meet.localhost}
      DISABLE_HTTPS: "${JITSI_DISABLE_HTTPS:-1}"
      ENABLE_HTTP_REDIRECT: "${JITSI_ENABLE_HTTP_REDIRECT:-0}"
      ENABLE_XMPP_WEBSOCKET: "${JITSI_ENABLE_XMPP_WEBSOCKET:-1}"
      ENABLE_COLIBRI_WEBSOCKET: "${JITSI_ENABLE_COLIBRI_WEBSOCKET:-1}"
      COLIBRI_WEBSOCKET_PORT: "${TRAEFIK_HTTPS_PORT:-443}"
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: ${JITSI_XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      XMPP_SERVER: ${JITSI_XMPP_SERVER:-xmpp.meet.jitsi}
      XMPP_PORT: "${JITSI_XMPP_PORT:-5222}"
      XMPP_BOSH_URL_BASE: ${JITSI_XMPP_BOSH_URL_BASE:-http://xmpp.meet.jitsi:5280}
      XMPP_GUEST_DOMAIN: ${JITSI_XMPP_GUEST_DOMAIN:-guest.meet.jitsi}
      XMPP_MUC_DOMAIN: ${JITSI_XMPP_MUC_DOMAIN:-muc.meet.jitsi}
      XMPP_HIDDEN_DOMAIN: ${JITSI_XMPP_HIDDEN_DOMAIN:-hidden.meet.jitsi}
      XMPP_RECORDER_DOMAIN: ${JITSI_XMPP_RECORDER_DOMAIN:-recorder.meet.jitsi}
    depends_on:
      - jvb
    networks:
      - default
      - meet.jitsi
  prosody:
    image: docker.io/jitsi/prosody:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: always
    expose:
      - "${JITSI_XMPP_PORT:-5222}"
      - "${JITSI_PROSODY_S2S_PORT:-5269}"
      - "5347"
      - "${JITSI_PROSODY_HTTP_PORT:-5280}"
    volumes:
      - jitsi_prosody_config:/config:Z
      - jitsi_prosody_plugins:/prosody-plugins-custom:Z
    labels:
      container_tag: "${COMPOSE_PROJECT_NAME:-rocketchat}#jitsi-prosody"
    environment:
      TZ: ${TZ:-UTC}
      PUBLIC_URL: ${JITSI_PUBLIC_URL:-https://meet.localhost}
      AUTH_TYPE: ${JITSI_AUTH_TYPE:-internal}
      ENABLE_AUTH: "${JITSI_ENABLE_AUTH:-0}"
      ENABLE_GUESTS: "${JITSI_ENABLE_GUESTS:-0}"
      ENABLE_XMPP_WEBSOCKET: "${JITSI_ENABLE_XMPP_WEBSOCKET:-1}"
      JICOFO_AUTH_PASSWORD: ${JITSI_JICOFO_AUTH_PASSWORD:-pass}
      JVB_AUTH_PASSWORD: ${JITSI_JVB_AUTH_PASSWORD:-pass}
      JVB_AUTH_USER: ${JITSI_JVB_AUTH_USER:-jvb}
      PROSODY_HTTP_PORT: "${JITSI_PROSODY_HTTP_PORT:-5280}"
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: ${JITSI_XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      XMPP_SERVER: ${JITSI_XMPP_SERVER:-xmpp.meet.jitsi}
      XMPP_PORT: "${JITSI_XMPP_PORT:-5222}"
      XMPP_GUEST_DOMAIN: ${JITSI_XMPP_GUEST_DOMAIN:-guest.meet.jitsi}
      XMPP_MUC_DOMAIN: ${JITSI_XMPP_MUC_DOMAIN:-muc.meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: ${JITSI_XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
      XMPP_SERVER_S2S_PORT: "${JITSI_PROSODY_S2S_PORT:-5269}"
    networks:
      meet.jitsi:
        aliases:
          - ${JITSI_XMPP_SERVER:-xmpp.meet.jitsi}
  jicofo:
    image: docker.io/jitsi/jicofo:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: always
    ports:
      - "127.0.0.1:${JITSI_JICOFO_REST_PORT:-8888}:8888"
    volumes:
      - jitsi_jicofo_config:/config:Z
    labels:
      container_tag: "${COMPOSE_PROJECT_NAME:-rocketchat}#jitsi-jicofo"
    environment:
      TZ: ${TZ:-UTC}
      AUTH_TYPE: ${JITSI_AUTH_TYPE:-internal}
      ENABLE_AUTH: "${JITSI_ENABLE_AUTH:-0}"
      JICOFO_AUTH_PASSWORD: ${JITSI_JICOFO_AUTH_PASSWORD:-pass}
      JVB_BREWERY_MUC: ${JITSI_JVB_BREWERY_MUC:-jvbbrewery}
      JVB_XMPP_AUTH_DOMAIN: ${JITSI_XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      JVB_XMPP_INTERNAL_MUC_DOMAIN: ${JITSI_XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
      JVB_XMPP_PORT: "${JITSI_XMPP_PORT:-5222}"
      JVB_XMPP_SERVER: ${JITSI_XMPP_SERVER:-xmpp.meet.jitsi}
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: ${JITSI_XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      XMPP_SERVER: ${JITSI_XMPP_SERVER:-xmpp.meet.jitsi}
      XMPP_PORT: "${JITSI_XMPP_PORT:-5222}"
      XMPP_MUC_DOMAIN: ${JITSI_XMPP_MUC_DOMAIN:-muc.meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: ${JITSI_XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
      XMPP_RECORDER_DOMAIN: ${JITSI_XMPP_RECORDER_DOMAIN:-recorder.meet.jitsi}
    depends_on:
      - prosody
    networks:
      - meet.jitsi
  jvb:
    image: docker.io/jitsi/jvb:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: always
    ports:
      - "${JITSI_JVB_PORT:-10000}:${JITSI_JVB_PORT:-10000}/udp"
      - "127.0.0.1:${JITSI_JVB_COLIBRI_PORT:-8080}:8080"
    volumes:
      - jitsi_jvb_config:/config:Z
    labels:
      container_tag: "${COMPOSE_PROJECT_NAME:-rocketchat}#jitsi-jvb"
    environment:
      TZ: ${TZ:-UTC}
      PUBLIC_URL: ${JITSI_PUBLIC_URL:-https://meet.localhost}
      ENABLE_COLIBRI_WEBSOCKET: "${JITSI_ENABLE_COLIBRI_WEBSOCKET:-1}"
      JVB_ADVERTISE_IPS: ${JITSI_JVB_ADVERTISE_IPS:-}
      JVB_AUTH_PASSWORD: ${JITSI_JVB_AUTH_PASSWORD:-pass}
      JVB_AUTH_USER: ${JITSI_JVB_AUTH_USER:-jvb}
      JVB_DISABLE_STUN: "${JITSI_JVB_DISABLE_STUN:-0}"
      JVB_PORT: "${JITSI_JVB_PORT:-10000}"
      JVB_WS_DOMAIN: ${JITSI_DOMAIN:-meet.localhost}
      JVB_XMPP_AUTH_DOMAIN: ${JITSI_XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      JVB_XMPP_INTERNAL_MUC_DOMAIN: ${JITSI_XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
      JVB_XMPP_PORT: "${JITSI_XMPP_PORT:-5222}"
      JVB_XMPP_SERVER: ${JITSI_XMPP_SERVER:-xmpp.meet.jitsi}
      XMPP_AUTH_DOMAIN: ${JITSI_XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: ${JITSI_XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
      XMPP_SERVER: ${JITSI_XMPP_SERVER:-xmpp.meet.jitsi}
      XMPP_PORT: "${JITSI_XMPP_PORT:-5222}"
    depends_on:
      - prosody
    networks:
      - meet.jitsi
volumes:
  mongodb_data:
    driver: local
  # this is for ssl shennanigans, users usually won't need to bother with it
  traefik_ssl:
    driver: local
  traefik_config:
    driver: local
  jitsi_jicofo_config:
    driver: local
  jitsi_jvb_config:
    driver: local
  jitsi_prosody_config:
    driver: local
  jitsi_prosody_plugins:
    driver: local
  jitsi_transcripts:
    driver: local
  jitsi_web_config:
    driver: local
  jitsi_web_crontabs:
    driver: local
  jitsi_web_load_test:
    driver: local
networks:
  meet.jitsi:
#   test: ["CMD", "nc", "-zv", "-w", "10", "rocketchat", "${PORT:-3000}"]

